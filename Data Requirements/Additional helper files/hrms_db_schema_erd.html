
<style>
#erd svg { max-width: 100%; }
#erd-wrap { padding: 8px 0; }
</style>
<h2 class="sr-only">HRMS database schema entity-relationship diagram</h2>
<div id="erd-wrap"><div id="erd"></div></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  EMPLOYEES {
    string emp_id PK
    string name
    string department
    string grade_level
    decimal basic_pay
    int years_of_service
    string role
    string manager_id
    string employment_status
    string country_code
    string currency_code
    string tax_regime
    string state_name
    string filing_status
    string tax_code
    string national_id_number
  }

  ATTENDANCE {
    string record_id PK
    string emp_id FK
    string pay_period
    int working_days_in_month
    int leave_with_pay
    int leave_without_pay
    decimal hours_worked
    decimal overtime_hours
  }

  FINANCIALS {
    string record_id PK
    string emp_id FK
    string pay_period
    decimal pending_claims
    decimal approved_reimbursement
    decimal insurance_premium
    decimal declared_investments
  }

  PAYROLL_RESULTS {
    string record_id PK
    string emp_id FK
    string batch_id
    string pay_period
    decimal final_gross_pay
    decimal final_net_pay
    decimal penalty_amount
    decimal pf_amount
    decimal pt_amount
    decimal monthly_tds_amount
    decimal overtime_pay
    decimal payout_amount
    decimal reimbursement_payout
    decimal gratuity_amount
    timestamp processed_at
  }

  PAYROLL_AUDIT_LOG {
    string log_id PK
    string batch_id
    string emp_id FK
    string action_type
    string performed_by
    timestamp ts
    string error_msg
  }

  FILE_REFERENCES {
    string ref_id PK
    string emp_id FK
    string pay_period
    string payslip_pdf_path
    string pf_challan_path
    string tax_report_path
  }

  LEAVE_RECORDS {
    string leave_id PK
    string emp_id FK
    date start_date
    date end_date
    string leave_type
    string status
  }

  EXPENSE_CLAIMS {
    string claim_id PK
    string emp_id FK
    decimal amount
    date expense_date
    string status
    string approved_by
    string category_id
  }

  EMPLOYEES ||--o{ ATTENDANCE : "has"
  EMPLOYEES ||--o{ FINANCIALS : "has"
  EMPLOYEES ||--o{ PAYROLL_RESULTS : "receives"
  EMPLOYEES ||--o{ PAYROLL_AUDIT_LOG : "logged for"
  EMPLOYEES ||--o{ FILE_REFERENCES : "has"
  EMPLOYEES ||--o{ LEAVE_RECORDS : "takes"
  EMPLOYEES ||--o{ EXPENSE_CLAIMS : "submits"
  PAYROLL_RESULTS ||--|| FILE_REFERENCES : "generates"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
